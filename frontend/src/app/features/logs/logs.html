<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Study Logs</h1>
        <button (click)="showForm.set(true)"
            class="bg-primary-600 hover:bg-primary-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
            + Add Study Log
        </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4">
        <div class="flex gap-4">
            <select [(ngModel)]="filters.phase" (change)="loadLogs()"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                <option value="">All Phases</option>
                <option value="gfg">GFG</option>
                <option value="striver">Striver</option>
                <option value="leetcode">LeetCode</option>
            </select>
            <select [(ngModel)]="filters.person" (change)="loadLogs()"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                <option value="">All Persons</option>
                <option value="Me">Me</option>
                <option value="Joydeep">Joydeep</option>
                <option value="Both">Both</option>
            </select>
        </div>
    </div>

    <!-- Logs Table -->
    <div class="bg-white rounded-lg shadow overflow-x-auto">
        <table class="w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Phase</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Topic</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Person</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Hours</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Questions</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr *ngFor="let log of logs()">
                    <td class="px-6 py-4 text-sm">{{ log.date | date }}</td>
                    <td class="px-6 py-4 text-sm">{{ log.phase }}</td>
                    <td class="px-6 py-4 text-sm">{{ log.topic }}</td>
                    <td class="px-6 py-4 text-sm">{{ log.person }}</td>
                    <td class="px-6 py-4 text-sm">{{ log.hours }}</td>
                    <td class="px-6 py-4 text-sm">{{ log.questions }}</td>
                    <td class="px-6 py-4 text-sm">
                        <button (click)="editLog(log)" class="text-blue-600 mr-2">Edit</button>
                        <button (click)="deleteLog(log.id)" class="text-red-600">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="logs().length === 0">
                    <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                        No study logs found. Add your first log!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Form Modal -->
    <div *ngIf="showForm()" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-[calc(100vw-500px)] w-full max-h-[80vh] overflow-y-auto ">
            <h2 class="text-xl font-bold mb-4">{{ editingLog() ? 'Edit' : 'Add' }} Log today's study session</h2>
            <form [formGroup]="logForm" (ngSubmit)="saveLog()" class="space-y-4 grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Date</label>
                    <input type="date" formControlName="date"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Phase</label>
                    <select formControlName="phase"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <option value="gfg">GFG</option>
                        <option value="striver">Striver</option>
                        <option value="leetcode">LeetCode</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Topic</label>
                    <input type="text" formControlName="topic"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                        placeholder="e.g., Arrays, DP, Trees">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Person</label>
                    <select formControlName="person"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <option value="Me">Me</option>
                        <option value="Joydeep">Joydeep</option>
                        <option value="Both">Both</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Hours</label>
                    <input type="number" formControlName="hours"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                        step="0.5">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Questions Solved</label>
                    <input type="number" formControlName="questions"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Difficulty</label>
                    <select formControlName="difficulty"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <option value="">Select</option>
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Notes</label>
                    <textarea formControlName="note"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                        rows="3"></textarea>
                </div>
                <div class="flex gap-2">
                    <button type="submit"
                        class="flex-1 bg-primary hover:bg-primary text-white font-medium py-2 px-4 rounded-lg transition-colors">Save</button>
                    <button type="button" (click)="showForm.set(false)"
                        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition-colors">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
